<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>히브리어 21-23과 완벽 해설 & 단어장 앱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #faf8f2;
      --text-color: #2c2c2c;
      --card-bg: #ffffff;
      --panel-bg: #fffbf0;
      --border-color: #e0dcd3;
      --primary-color: #2d7a45;
      --secondary-color: #d84b2a;
      --pronun-color: #1a56a8;
      --vocab-bg: #eaf4eb;
      --vocab-border: #92c7a3;
      --tab-bg: #eaddc5;
      --tab-active: #2d7a45;
      --tab-text: #ffffff;
      --btn-bg: #f0eee1;
      --btn-hover: #e2dfcd;
      --table-header: #efebdc;
      --shadow: rgba(0,0,0,0.06);
    }

    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #e4e4e4;
      --card-bg: #2a2a2a;
      --panel-bg: #333129;
      --border-color: #4a4a4a;
      --primary-color: #5ab578;
      --secondary-color: #ff7e60;
      --pronun-color: #82baff;
      --vocab-bg: #2b3a30;
      --vocab-border: #4d825f;
      --tab-bg: #3a3a3a;
      --tab-active: #5ab578;
      --btn-bg: #3f3f3f;
      --btn-hover: #555555;
      --table-header: #383838;
      --shadow: rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-color);
      color: var(--text-color); line-height: 1.6; transition: all 0.3s ease; padding: 10px;
    }

    header { max-width: 900px; margin: 0 auto 20px auto; text-align: center; padding: 20px 0; }
    h1 { font-size: 1.6rem; margin-bottom: 15px; color: var(--text-color); }

    .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }

    button {
      font-family: inherit; cursor: pointer; border: none; border-radius: 8px;
      padding: 8px 16px; background-color: var(--btn-bg); color: var(--text-color);
      font-weight: 700; transition: background-color 0.2s;
    }
    button:hover { background-color: var(--btn-hover); }

    .status-bar { font-weight: 700; color: var(--primary-color); margin-bottom: 15px; }

    .tabs {
      display: flex; max-width: 900px; margin: 0 auto;
      border-radius: 12px 12px 0 0; overflow: hidden; background-color: var(--tab-bg);
    }
    .tab-btn {
      flex: 1; padding: 15px 10px; background: none; border-radius: 0;
      font-weight: 700; color: #333; font-size: 1.1rem;
    }
    body.dark-mode .tab-btn { color: #eee; }
    .tab-btn.active { background-color: var(--tab-active); color: var(--tab-text); }

    .tab-content {
      display: none; max-width: 900px; margin: 0 auto; background-color: var(--bg-color); padding: 20px 0;
    }
    .tab-content.active { display: block; }

    .section-title {
      font-size: 1.3rem; margin: 25px 0 15px 0; padding-bottom: 8px;
      border-bottom: 3px solid var(--border-color); color: var(--primary-color);
    }

    /* 히브리어 요구사항 적용: 굵게, 크기 1.8rem */
    .hebrew {
      font-family: 'Frank Ruhl Libre', serif; font-weight: 700; font-size: 1.8rem;
      direction: rtl; display: inline-block; letter-spacing: 1px;
    }
    .hebrew-small { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; font-size: 1.5rem; direction: rtl; }

    details.question-card {
      background-color: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 12px; margin-bottom: 18px; box-shadow: 0 4px 8px var(--shadow); overflow: hidden;
    }

    summary.q-summary {
      list-style: none; cursor: pointer; padding: 18px; display: flex; flex-direction: column; gap: 12px;
    }
    summary.q-summary::-webkit-details-marker { display: none; }

    .q-header { display: flex; align-items: center; gap: 15px; }
    .q-num { font-weight: 900; color: var(--secondary-color); font-size: 1.3rem; min-width: 30px;}

    .toggle-indicator {
      background-color: var(--btn-bg); text-align: center; padding: 10px;
      border-radius: 8px; font-size: 0.95rem; font-weight: 700; color: var(--text-color);
    }
    summary.q-summary:hover .toggle-indicator { background-color: var(--btn-hover); }
    details[open] .toggle-indicator { background-color: var(--border-color); content: "▲ 해설 접기"; }

    .explanation-panel {
      background-color: var(--panel-bg); padding: 25px; border-top: 1px dashed var(--border-color); font-size: 1rem;
    }

    .exp-box {
      background-color: var(--card-bg); border-left: 4px solid var(--primary-color);
      padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
    }
    
    .exp-title { font-weight: 700; color: var(--primary-color); margin-bottom: 8px; font-size: 1.05rem;}
    .ans-highlight { color: var(--secondary-color); font-weight: 900; font-size: 1.15rem; }
    .pronun { color: var(--pronun-color); font-style: italic; font-weight: 700; }
    
    /* 📝 단어장 전용 스타일 (새로 추가됨) */
    .vocab-box {
      background-color: var(--vocab-bg); border: 1px solid var(--vocab-border);
      padding: 15px; border-radius: 8px; margin-bottom: 15px;
    }
    .vocab-title { font-weight: 700; color: var(--primary-color); margin-bottom: 10px; font-size: 1.05rem;}
    .vocab-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .vocab-word-item {
      background-color: var(--card-bg); padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--vocab-border); font-size: 0.95rem; display: flex; align-items: center; gap: 5px;
    }
    .vocab-pronun { color: var(--pronun-color); font-size: 0.85rem; font-weight: bold; }

    table.detail-table {
      width: 100%; border-collapse: collapse; margin-top: 10px; background-color: var(--card-bg); font-size: 0.95rem;
    }
    table.detail-table th, table.detail-table td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
    table.detail-table th { background-color: var(--table-header); font-weight: 700; }
    
    .grammar-point { background-color: rgba(45, 122, 69, 0.1); border-radius: 8px; padding: 15px; margin-top: 15px; font-weight: 500; }

    @media (max-width: 600px) {
      .hebrew { font-size: 1.5rem; } .q-header { flex-direction: column; align-items: flex-end; width: 100%; }
      .q-num { align-self: flex-start; } .tab-btn { font-size: 0.9rem; padding: 12px 5px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📖 히브리어 21-23과 완벽 해설 & 단어장</h1>
    <div class="controls">
      <button id="themeToggle">🌙 다크 모드</button>
      <button id="expandAll">🔽 전체 펼치기</button>
      <button id="collapseAll">🔼 전체 접기</button>
    </div>
    <div class="status-bar" id="statusCounter">0 / 0 해설 열림</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-target="lesson21">21과: 분사</button>
    <button class="tab-btn" data-target="lesson22">22과: 전치사 대명접미어</button>
    <button class="tab-btn" data-target="lesson23">23과: 존재/소유</button>
  </div>

  <main>
    <div id="lesson21" class="tab-content active"></div>
    <div id="lesson22" class="tab-content"></div>
    <div id="lesson23" class="tab-content"></div>
  </main>

  <script>

      { title: "1) 분사 형태 분해", type: "verb", items: [

        { q: "הֹלֶכֶת", a: "qal ptc fs", p: "홀레켓", r: "הלך", rm: "가다", t: ["qal","ptc","-","f","s","הלך"], d: "여성 단수 어미 ֶת 결합.", pt: "여성 단수 분사는 보통 ֶת 또는 ָה로 끝납니다.", v: "הָלַךְ(할라크): 가다" },
        { q: "עֹבְרִים", a: "qal ptc mp", p: "오브림", r: "עבר", rm: "지나가다", t: ["qal","ptc","-","m","p","עבר"], d: "남성 복수 어미 ִים 결합.", pt: "복수 어미가 붙으면 강세가 이동하여 중간 모음이 짧아집니다.", v: "עָבַר(아바르): 지나가다" },
        { q: "שֹׁלְחוֹת", a: "qal ptc fp", p: "숄호트", r: "שלח", rm: "보내다", t: ["qal","ptc","-","f","p","שלח"], d: "여성 복수 어미 וֹת 결합.", pt: "여성 복수 명사/분사의 특징적인 끝 모양인 וֹת를 기억하세요.", v: "שָׁלַח(샬라흐): 보내다" },
        { q: "שֹׁלֵחַ", a: "qal ptc ms (후음)", p: "숄레아흐", r: "שלח", rm: "보내다", t: ["qal","ptc","-","m","s","שלח"], d: "어근 마지막 자음이 후음(ח)이라 파타흐-푸르티브(훔쳐온 아) 발생.", pt: "후음(ח, ע)으로 끝나는 단어는 끝에 숨겨진 '아' 발음이 추가됩니다.", v: "שָׁלַח(샬라흐): 보내다" },
        { q: "נֹשֵׂאת", a: "qal ptc fs", p: "노세트", r: "נשא", rm: "들다/나르다", t: ["qal","ptc","-","f","s","נשא"], d: "라메드-알렙(א) 동사의 특수한 여성 단수 형태.", pt: "끝이 א인 동사는 분사 여성형을 만들 때 ֵאת 형태를 취합니다.", v: "נָשָׂא(나사): 들다/나르다" },

        let match = word.match(/(.*?)\((.*?)\):(.*)/);
        if(match) {
          return `<span class="vocab-word-item">
                    <span class="hebrew-small">${match[1].trim()}</span> 
                    <span class="vocab-pronun">(${match[2].trim()})</span> 
                    <span>${match[3].trim()}</span>
                  </span>`;
        }
        return `<span>${word}</span>`;
      }).join('');
      
      return `
        <div class="vocab-box">
          <div class="vocab-title">📝 주요 단어장</div>
          <div class="vocab-grid">${words}</div>
        </div>
      `;
    }

    function renderVerb(item, index) {
      return `
        <details class="question-card">
          <summary class="q-summary">
            <div class="q-header">
              <span class="q-num">${index + 1}.</span>
              <span class="hebrew">${item.q}</span>
            </div>
            <div class="toggle-indicator">▼ 해설 및 단어장 열기</div>
          </summary>
          <div class="explanation-panel">
            <div class="exp-box">
              <div class="exp-item">📖 정답: <span class="ans-highlight">${item.a}</span></div>
              <div class="exp-item" style="margin-top:8px;">🔤 발음: <span class="pronun">${item.p}</span></div>
              <div class="exp-item" style="margin-top:8px;">🌱 원형(어근): <span class="hebrew-small" style="margin-left:5px;">${item.r}</span> (${item.rm})</div>
            </div>
            ${renderVocab(item.v)}
            <div class="exp-box">
              <div class="exp-title">🔍 문법 분석표</div>
              <table class="detail-table">
                <tr><th>변화형</th><th>활용형</th><th>인칭</th><th>성</th><th>수</th><th>어근</th></tr>
                <tr><td>${item.t[0]}</td><td>${item.t[1]}</td><td>${item.t[2]}</td><td>${item.t[3]}</td><td>${item.t[4]}</td><td class="hebrew-small">${item.t[5]}</td></tr>
              </table>
              <div class="exp-item" style="margin-top:15px;">💡 <strong>변형 이유:</strong> ${item.d}</div>
            </div>
            <div class="grammar-point">📚 <strong>핵심 포인트:</strong> ${item.pt}</div>
          </div>
        </details>
      `;
    }

    function renderText(item, index) {
      return `
        <details class="question-card">
          <summary class="q-summary">
            <div class="q-header">
              <span class="q-num">${index + 1}.</span>
              <span class="hebrew">${item.q}</span>
            </div>
            <div class="toggle-indicator">▼ 해설 및 단어장 열기</div>
          </summary>
          <div class="explanation-panel">
            <div class="exp-box">
              <div class="exp-item">📖 정답/번역: <span class="ans-highlight">${item.a}</span></div>
            </div>
            ${renderVocab(item.v)}
            <div class="exp-box" style="border-left-color: var(--secondary-color);">
              <div class="exp-title">🔍 구조 분석 & 특수 문법 사항</div>
              <div class="exp-item">${item.d}</div>
            </div>
          </div>
        </details>
      `;
    }

    function initApp() {
      const buildSection = (dataList) => dataList.map(sec => {
        let html = `<h2 class="section-title">${sec.title}</h2>`;
        html += sec.items.map((item, i) => {
          return sec.type === 'verb' ? renderVerb(item, i) : renderText(item, i);
        }).join('');
        return html;
      }).join('');

      document.getElementById('lesson21').innerHTML = buildSection(data21);
      document.getElementById('lesson22').innerHTML = buildSection(data22);
      document.getElementById('lesson23').innerHTML = buildSection(data23);

      const updateCounter = () => {
        const activeTab = document.querySelector('.tab-content.active');
        const total = activeTab.querySelectorAll('details').length;
        const open = activeTab.querySelectorAll('details[open]').length;
        document.getElementById('statusCounter').textContent = `${open} / ${total} 해설 열림`;
      };

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.target).classList.add('active');
          updateCounter();
        });
      });

      document.body.addEventListener('toggle', (e) => {
        if(e.target.tagName === 'DETAILS') updateCounter();
      }, true);

      document.getElementById('themeToggle').addEventListener('click', (e) => {
        document.body.classList.toggle('dark-mode');
        e.target.textContent = document.body.classList.contains('dark-mode') ? "☀️ 라이트 모드" : "🌙 다크 모드";
      });

      document.getElementById('expandAll').addEventListener('click', () => {
        document.querySelector('.tab-content.active').querySelectorAll('details').forEach(d => d.open = true);
        updateCounter();
      });
      document.getElementById('collapseAll').addEventListener('click', () => {
        document.querySelector('.tab-content.active').querySelectorAll('details').forEach(d => d.open = false);
        updateCounter();
      });

      updateCounter();
    }

    window.onload = initApp;
  </script>
</body>
</html>
