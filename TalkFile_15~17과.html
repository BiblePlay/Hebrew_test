                        { id: "15-5-1", heb: "יִשְׁלְחוּ", pron: "이쉴레후", trans: "그들이 보낼 것이다", root: "שָׁלַח (보내다)", parse: "Qal(칼), 미완료(Impf), 3인칭 남성 복수 (3mp)", desc: "강변화 동사의 규칙적인 미완료 형태(`יִקְטְלוּ`)입니다. 접두어 `יִ`(3인칭 남성) + 복수 접미어 `וּ`. 첫 번째 자음 `ש` 아래의 쉐바(`ְ`)는 단모음(히렉 `יִ`) 뒤에 닫힌 음절을 형성하므로 무성 쉐바입니다." },

                        { id: "15-5-3", heb: "גָּאֲלָה", pron: "가알라", trans: "그녀가 구속했다", root: "גָּאַל (구속하다)", parse: "Qal(칼), 완료(Pf), 3인칭 여성 단수 (3fs)", desc: "아인-후음(가운데 글자가 후음) 동사입니다. 완료 3fs 접미어 `ה ָ`가 붙으면 강세 이동으로 두 번째 글자가 무성 쉐바를 가져야 하지만, 가운데 자음 `א`(알렙)은 후음이라 무성 쉐바 대신 아주 짧은 '아' 소리인 하텝 파타흐(`ֲ`)를 취합니다." },

                        { id: "15-6-3", heb: "יִבְנוּ הָאִישׁ וְהָאִשָּׁה בַּיִת לַבָּנִים וְלַבָּנוֹת", pron: "이브누 하-이쉬 베하-잇샤 바이트 라-바님 베라-바노트", trans: "그 남자와 그 여자가 그 아들들과 그 딸들을 위해 집 한 채를 지을 것이다.", desc: "`יִבְנוּ`(지을 것이다, Qal 미완료 3mp, 라메드-헤 ה 탈락) + `הָאִישׁ וְהָאִשָּׁה`(주어) + `בַּיִת`(목적어) + `לַבָּנִים וְלַבָּנוֹת`(~를 위해 + 그 아들들과 딸들)." },

                        { id: "17-6-1", heb: "בָּכוּ הַנְּעָרִים", pron: "바쿠 하-느아림", trans: "그 소년들이 울었다.", desc: "`בָּכוּ`: 어근 בָּכָה, 라메드-헤 완료 3cp. 모음 접미어 `וּ` 앞에서 `ה` 탈락." },
                        { id: "17-6-2", heb: "אֶרְאֶה אֶת־הָאוֹיֵב", pron: "에르에 에트 하-오옙", trans: "내가 그 원수를 볼 것이다.", desc: "`אֶרְאֶה`: 어근 רָאָה, 라메드-헤 미완료 1cs." },
                        { id: "17-6-3", heb: "קָרָאתָ אֶת־הַתּוֹרָה", pron: "카라타 에트 하-토라", trans: "네가 그 율법을 읽었다.", desc: "`קָרָאתָ`: 어근 קָרָא, 라메드-알렙 완료 2ms, `א` 묵음화로 카메츠 유지." },
                        { id: "17-6-4", heb: "בְּנִיתֶם בַּיִת", pron: "브니템 바이트", trans: "너희들이 집을 지었다.", desc: "`בְּנִיתֶם`: 어근 בָּנָה, 라메드-헤 완료 2mp, 자음 접미어 앞에서 `ה`가 `י`로 변함." },
                        { id: "17-6-5", heb: "יִסַּע הָעָם", pron: "잇사 하-암", trans: "그 백성이 길을 떠날 것이다.", desc: "`יִסַּע`: 어근 נָסַע, 페-눈 미완료 3ms, `נ` 탈락 및 동화." },
                        { id: "17-6-6", heb: "נִמְצָא אָב", pron: "님차 아브", trans: "우리가 아버지를 찾을 것이다. (또는 아버지가 발견되었다)", desc: "형태상 Niphal 완료 3ms와 Qal 미완료 1cp가 동일함. `א` 묵음." },

                        { id: "17-6-8", heb: "יִשְׂאוּ לֶחֶם", pron: "이세우 레헴", trans: "그들이 떡을 나를 것이다.", desc: "`יִשְׂאוּ`: 어근 נָשָׂא, 페-눈+라메드-알렙 3mp. `נ` 동화, `א`는 접미어 앞에서 묵음." },
                        { id: "17-6-9", heb: "נִכְלֶה", pron: "니클레", trans: "우리가 끝낼 것이다.", desc: "`נִכְלֶה`: 어근 כָּלָה, 라메드-헤 미완료 1cp." },

                {

                    items: [
                        { id: "17-7-1", heb: "בָּנוּ הָאָב וְהַבֵּן אֶת־הַבַּיִת הַזֶּה", pron: "바누 하-아브 베하-벤 에트-하-바이트 하-제", trans: "그 아버지와 그 아들이 이 집을 지었다.", desc: "`בָּנוּ`: 지었다 (Qal 완료 3cp) / `אֶת־הַבַּיִת הַזֶּה`: 목적격 + 그 집 + 이(지시대명사 한정적)." },
                        { id: "17-7-2", heb: "לֹא תִגַּע אֶת־זִבְחִי אֲשֶׁר עַל־הַמִּזְבֵּחַ", pron: "로 티가 에트-지브히 아셰르 알-하-미즈베아흐", trans: "너(남성)는 제단 위에 있는 내 제물에 손 대어서는 안 된다.", desc: "`לֹא תִגַּע`: 만지지 말라 (페-눈 미완료 2ms 금지) / `אֲשֶׁר עַל־הַמִּזְבֵּחַ`: 관계대명사절 '제단 위에 있는(~하는 것)'." },
                        { id: "17-7-3", heb: "מָצָאתִי אֶת־הַכֶּסֶף אֲשֶׁר בַּמָּקוֹם הַהוּא", pron: "마차티 에트-하-케세프 아셰르 바-마콤 하-후", trans: "나는 저 장소에 있는 은을 찾아냈다.", desc: "`אֲשֶׁר בַּמָּקוֹם הַהוּא`: 관계대명사 구문. '그(저) 장소(`הַמָּקוֹם הַהוּא`) 안에(`בְּ`) 있는(`אֲשֶׁר`)'." },
                        { id: "17-7-4", heb: "קָרָא נְבִיא יְהוָה בְּקוֹל גָּדוֹל", pron: "카라 나비 야훼 베콜 가돌", trans: "야훼의 그 예언자가 큰 소리로 외쳤다.", desc: "`קָרָא`: 불렀다, 외쳤다 (Qal 완료 3ms) / `בְּקוֹל גָּדוֹל`: 전치사 `בְּ`(~으로) + 소리 + 큰." },
                        { id: "17-7-5", heb: "בָּעֵת הַהִיא תִּדְרֹשׁ אֶת־הָאֱלֹהִים הַחַיִּים בְּכָל־לִבְּךָ וּבְכָל־נַפְשְׁךָ", pron: "바-에트 하-히 티드로쉬 에트-하-엘로힘 하-하임 베콜-립브카 우베콜-나프쉐카", trans: "그때에, 너는 네 온 마음과 네 온 영혼으로 살아계신 하나님을 찾을 것이다.", desc: "`בָּעֵת הַהִיא`: 그 때에 / `תִּדְרֹשׁ`: 찾을 것이다 / `הָאֱלֹהִים הַחַיִּים`: 살아계신 하나님 (복수 장엄형)." },
                        { id: "17-7-6", heb: "חֲזָקִים עַבְדֵי הַמֶּלֶךְ מֵעַבְדֵי הַכֹּהֵן", pron: "하자기임 아브데이 하-멜레크 메-아브데이 하-코헨", trans: "그 왕의 종들은 그 제사장의 종들보다 더 강하다.", desc: "`חֲזָקִים`: 강하다 (복수 서술적) / `מֵעַבְדֵי הַכֹּהֵן`: 전치사 `מִן`(~보다) + 종들 + 제사장. 비교급 구문." },
                        { id: "17-7-7", heb: "לֹא עָבַר עַמִּי אֶת־בְּרִיתִי הַקְּדוֹשָׁה", pron: "로 아바르 암미 에트-브리티 하-크도샤", trans: "내 백성은 내 거룩한 언약을 어기지 않았다.", desc: "`עָבַר`: 지나갔다, 어겼다 / `עַמִּי`: 내 백성 / `בְּרִיתִי`: 내 언약 / `הַקְּדוֹשָׁה`: 거룩한 (여성형, 한정적 용법)." },
                        { id: "17-7-8", heb: "זֶה זְהַב אִמֵּנוּ אֲשֶׁר נָתְנָה לַאֲדוֹנָהּ", pron: "제 제하브 임메누 아셰르 나트나 라-아도나흐", trans: "이것은 우리 어머니가 그분의 주인께 드렸던 우리 어머니의 금이다.", desc: "`זֶה`: 이것은(서술적) / `זְהַב אִמֵּנוּ`: 금 연계형 + 우리 어머니 / `אֲשֶׁר נָתְנָה`: 그녀가 주었던 것 / `לַאֲדוֹנָהּ`: 그녀의 주인에게." }
                    ]

        };

        // ==========================================
        // 2. React Components
        // ==========================================
        const { useState } = React;

        const BookOpen = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        );
        const ChevronDown = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>
        );
        const ChevronUp = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const BookA = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path><path d="m8 13 4-7 4 7"></path><path d="M9.1 11h5.8"></path></svg>
        );
        const Lightbulb = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
        );

        function Flashcard({ item }) {
            const [isExpanded, setIsExpanded] = useState(false);

            return (
                <div 
                    onClick={() => setIsExpanded(!isExpanded)}
                    className={`bg-white border rounded-xl overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-md ${isExpanded ? 'border-blue-300 shadow-md ring-1 ring-blue-100' : 'border-slate-200'}`}
                >
                    <div className="p-6 text-center bg-slate-50 relative">

                        <div className="hebrew-print hebrew-large mb-2" dir="rtl">{item.heb}</div>
                        <div className="text-slate-500 font-medium tracking-wide">[{item.pron}]</div>
                        
                        <div className="absolute top-4 right-4 text-slate-300">
                            {isExpanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="p-6 border-t border-slate-100 card-enter">
                            <div className="mb-4">
                                <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1 flex items-center">
                                    <CheckCircle size={14} className="mr-1 inline text-green-500"/>
                                    의미 (번역)
                                </h4>
                                <p className="text-lg text-slate-800 font-semibold">{item.trans}</p>
                            </div>

                            {item.parse && (
                                <div className="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                    <h4 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-1 flex items-center">
                                        <BookA size={14} className="mr-1 inline"/>
                                        형태 분해 (Parsing)
                                    </h4>
                                    <p className="text-blue-900 font-medium mb-1">
                                        <span className="text-slate-500 mr-2">어근:</span> 
                                        <span className="hebrew-inline mr-1 text-lg">{item.root.split(' ')[0]}</span> 
                                        <span className="text-sm">{item.root.replace(item.root.split(' ')[0], '')}</span>
                                    </p>
                                    <p className="text-blue-900 text-sm font-bold bg-white inline-block px-2 py-1 rounded shadow-sm">
                                        {item.parse}

                                </div>

                            <div>
                                <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1 flex items-center">
                                    <Lightbulb size={14} className="mr-1 inline text-amber-500"/>

                                </h4>
                                <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap bg-slate-50 p-3 rounded-lg border border-slate-100">
                                    {item.desc}
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [chapter, setChapter] = useState(15);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-blue-900 text-white shadow-lg sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-6">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-extrabold flex items-center">
                                    <BookOpen className="mr-3" size={28} />
                                    구약 히브리어 마스터
                                </h1>
                                <span className="text-xs bg-blue-800 px-2 py-1 rounded-md text-blue-200 border border-blue-700">
                                    인쇄체(Print) 폰트 적용됨
                                </span>
                            </div>
                            
                            {/* Tabs */}
                            <div className="flex space-x-2">
                                {[15, 16, 17].map(ch => (
                                    <button 
                                        key={ch}
                                        onClick={() => setChapter(ch)}
                                        className={`px-5 py-2 font-bold rounded-t-lg transition-colors ${chapter === ch ? 'bg-white text-blue-900' : 'bg-blue-800 text-blue-300 hover:bg-blue-700'}`}
                                    >
                                        제 {ch} 장
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-4xl mx-auto w-full px-4 py-8">
                        <div className="mb-6 bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-lg text-slate-700 shadow-sm text-sm">
                            <p><strong>학습 안내:</strong> 카드를 클릭하면 정답과 상세한 문법 분해가 나타납니다. 폰트는 성경과 교재에서 사용하는 표준 <b>명조/인쇄체(Frank Ruhl Libre / Ezra SIL)</b>를 강제 적용하여 모음(니쿠드)이 아주 선명하게 보입니다.</p>
                        </div>

                        {hebrewData[chapter].map((sectionData, idx) => (
                            <div key={idx} className="mb-10">
                                <h2 className="text-xl font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-6 flex items-center">
                                    <span className="bg-blue-100 text-blue-800 w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">
                                        {idx + 1}
                                    </span>
                                    {sectionData.section}
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {sectionData.items.map((item) => (
                                        <Flashcard key={item.id} item={item} />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="bg-slate-800 text-center text-slate-400 py-6 text-sm">
                        <p>구약성서 히브리어 시작하기 연습문제 상세 해설 앱 (15~17과)</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
